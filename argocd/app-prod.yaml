apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-prod
  namespace: argocd
  labels:
    env: prod
spec:
  project: default

  source:
    # CHANGE THIS to your own Git repo URL
    repoURL: https://github.com/v4rdhan/Kustomize-plus-ArgoCD.git
    targetRevision: HEAD
    path: overlays/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: prod

  syncPolicy:
    # NOTE: prod uses MANUAL sync - you review before appliyng
    syncOptions:
      - CreateNamespace=true
    # Uncomment below to enable auto-sync for prod too
    automated:
      prune: true
      selfHeal: true